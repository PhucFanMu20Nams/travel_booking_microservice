name: CI

on:
  push:
    branches: [ "main"]
    paths-ignore:
      - "README.md"
      - "CHANGELOG.md"
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:

  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ github.token }}
          persist-credentials: false
          fetch-depth: 1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'

      - name: build building-blocks
        run: |
          npm install
          npm run build
        working-directory: ./src/building-blocks

      - name: build identity
        run: |
          npm install
          npm run build
        working-directory: ./src/identity

      - name: test identity
        run: npm test
        working-directory: ./src/identity
        env:
          NODE_ENV: test
          JWT_SECRET: test-jwt-secret-1234

      - name: build flight
        run: |
          npm install
          npm run build
        working-directory: ./src/flight

      - name: build passenger
        run: |
          npm install
          npm run build
        working-directory: ./src/passenger

      - name: build booking
        run: |
          npm install
          npm run build
        working-directory: ./src/booking
