server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/v1/identity { proxy_pass http://identity:3333; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /api/v1/user     { proxy_pass http://identity:3333; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /api/v1/flight   { proxy_pass http://flight:3344;   proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /api/v1/seat     { proxy_pass http://flight:3344;   proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /api/v1/airport  { proxy_pass http://flight:3344;   proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /api/v1/aircraft { proxy_pass http://flight:3344;   proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /api/v1/passenger{ proxy_pass http://passenger:3355; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /api/v1/booking  { proxy_pass http://booking:3366;  proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1000;
}
